name: email-triage-env
description: >
  A real-world email triage environment where an AI agent classifies,
  prioritizes, and routes incoming emails across three difficulty levels.
version: "1.0.0"
author: Divya Maddheshia
tags:
  - openenv
  - email
  - nlp
  - classification
  - triage

tasks:
  - id: task_easy
    name: Email Urgency Classification
    description: Classify each email as urgent or not_urgent
    difficulty: easy
    max_steps: 10
    reward_range: [0.1, 0.9]

  - id: task_medium
    name: Email Category Classification
    description: >
      Classify each email into one of five categories:
      billing, technical_support, complaint, general_inquiry, spam
    difficulty: medium
    max_steps: 10
    reward_range: [0.1, 0.9]

  - id: task_hard
    name: Full Email Triage
    description: >
      Classify email category, assign priority (1=critical to 5=low),
      and route to the appropriate department.
    difficulty: hard
    max_steps: 10
    reward_range: [0.1, 0.9]

observation_space:
  type: object
  properties:
    email_id:
      type: string
    subject:
      type: string
    body:
      type: string
    sender:
      type: string
    task_id:
      type: string
    step_number:
      type: integer
    total_steps:
      type: integer

action_space:
  type: object
  properties:
    urgency:
      type: string
      enum: [urgent, not_urgent]
    category:
      type: string
      enum: [billing, technical_support, complaint, general_inquiry, spam]
    priority:
      type: integer
      minimum: 1
      maximum: 5
    routing_department:
      type: string
      enum: [finance, tech_team, customer_relations, general_support, spam_filter]

endpoints:
  health:
    method: GET
    path: /
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
